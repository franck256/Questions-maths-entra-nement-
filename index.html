<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nombres Relatifs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #d9e4ec 100%);
    overscroll-behavior: none;
    user-select: none;
  }
  #app {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  h1 {
    text-align: center;
    color: #1e3a5f;
    font-size: 1.5rem;
    margin: 8px 0 24px 0;
  }
  h2 {
    text-align: center;
    color: #1e3a5f;
    font-size: 1.15rem;
    margin: 0 0 16px 0;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 4px 16px rgba(30,58,95,0.08);
    margin-bottom: 16px;
  }

  input[type=text] {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    border: 2px solid #cbd8e3;
    border-radius: 12px;
    text-align: center;
    background: #fafcfe;
  }
  input[type=text]:focus { outline: none; border-color: #3b82c4; }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin-top: 14px;
    font-size: 1.05rem;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #3b82c4, #2c5f8a);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.secondary {
    background: #eef2f6;
    color: #2c5f8a;
    font-weight: 500;
  }
  .btn.skip {
    background: #f5f0e0;
    color: #8a6d1e;
  }

  .progress-bar-wrap {
    height: 8px;
    background: #e2e9ef;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82c4, #5fa8dd);
    transition: width 0.25s;
  }
  .quiz-header-row {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 10px;
  }
  .link-btn {
    background: none;
    border: none;
    color: #6b7f91;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 4px 0;
    cursor: pointer;
  }
  .link-btn:active { opacity: 0.6; }
  .quiz-top-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #5c7185;
    margin-bottom: 14px;
  }
  .score-badge { font-weight: 700; color: #2c5f8a; }

  .question-box {
    background: white;
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(30,58,95,0.08);
    margin-bottom: 16px;
  }
  .question-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    color: #3b82c4;
    background: #eaf3fb;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 0.03em;
  }
  .question-text {
    font-size: 1.45rem;
    color: #1e3a5f;
    font-weight: 600;
    line-height: 1.4;
  }
  .question-hint {
    font-size: 0.85rem;
    color: #8395a5;
    margin-top: 10px;
  }

  .answer-display {
    background: #f5f8fb;
    border: 2px solid #cbd8e3;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    color: #1e3a5f;
    min-height: 26px;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  .answer-display.empty { color: #b0bfcb; }
  .answer-display.correct { border-color: #4caf7d; background: #eafaf1; color: #2e7d54; }
  .answer-display.wrong { border-color: #e0655f; background: #fdecec; color: #b8403a; }

  .feedback-note {
    text-align: center;
    font-size: 0.9rem;
    color: #b8403a;
    min-height: 20px;
    margin-bottom: 8px;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .numpad button {
    padding: 16px 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: #1e3a5f;
    background: white;
    border: none;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(30,58,95,0.08);
    cursor: pointer;
  }
  .numpad button:active { background: #eaf3fb; }
  .numpad button.func { color: #6b7f91; font-size: 1.05rem; }
  .numpad button.sign { color: #b8403a; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .action-row .btn { margin-top: 0; }

  .results-summary {
    text-align: center;
    margin-bottom: 20px;
  }
  .results-score {
    font-size: 2.4rem;
    font-weight: 800;
    color: #2c5f8a;
  }
  .results-score span { font-size: 1.3rem; color: #8395a5; }
  .results-msg { color: #5c7185; margin-top: 6px; font-size: 0.95rem; }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid #eef2f6;
    font-size: 0.9rem;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .bd-q { color: #1e3a5f; flex: 1; padding-right: 10px; }
  .bd-status {
    font-weight: 700;
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .bd-status.ok { background: #eafaf1; color: #2e7d54; }
  .bd-status.ko { background: #fdecec; color: #b8403a; }
  .bd-status.skip { background: #f5f0e0; color: #8a6d1e; }

  .footer-note {
    text-align: center;
    font-size: 0.75rem;
    color: #a3b2c0;
    margin-top: auto;
    padding-top: 20px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ECRAN 1 : Nom -->
  <div class="screen active" id="screen-name">
    <h1>➕➖ Nombres Relatifs<br><span style="font-size:0.9rem; font-weight:400; color:#5c7185;">Les 4 opérations</span></h1>
    <div class="card">
      <h2>Ton prénom</h2>
      <input type="text" id="input-name" placeholder="Ex : Léo" autocomplete="off" autocapitalize="words">
      <button class="btn" id="btn-name-next">Commencer (10 questions)</button>
    </div>
    <div class="footer-note">Calculs simples et calculs avec règles de priorité</div>
  </div>

  <!-- ECRAN 2 : Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header-row">
      <button class="link-btn" id="btn-quiz-restart">← Recommencer</button>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="quiz-top-row">
      <span id="quiz-progress-text">Question 1/10</span>
      <span class="score-badge" id="quiz-score-text">Score : 0</span>
    </div>

    <div class="question-box">
      <div class="question-tag" id="question-tag">CALCUL</div>
      <div class="question-text" id="question-text">...</div>
      <div class="question-hint" id="question-hint"></div>
    </div>

    <div class="answer-display empty" id="answer-display">Ta réponse</div>
    <div class="feedback-note" id="feedback-note"></div>

    <div class="numpad" id="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button data-key="back" class="func">⌫</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button data-key="sign" class="sign">±</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button data-key="0">0</button>
      <button data-key="." class="func" style="grid-column: span 2;">,</button>
    </div>

    <div class="action-row">
      <button class="btn skip" id="btn-skip" style="flex:1;">Passer</button>
      <button class="btn" id="btn-validate" style="flex:2;">Valider</button>
    </div>
  </div>

  <!-- ECRAN 3 : Résultats -->
  <div class="screen" id="screen-results">
    <h2>Résultats</h2>
    <div class="card results-summary">
      <div class="results-score"><span id="results-name"></span><br><span id="results-score-num">0</span><span> / <span id="results-total">0</span></span></div>
      <div class="results-msg" id="results-msg"></div>
    </div>
    <div class="card" id="breakdown-card" style="max-height:340px; overflow-y:auto;"></div>
    <button class="btn" id="btn-retry">Recommencer</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  const TOTAL_QUESTIONS = 10;

  // ---------- Utilitaires aléatoires ----------
  function randInt(min, max) {
    const range = max - min + 1;
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return min + (buf[0] % range);
  }
  function randChoice(arr) { return arr[randInt(0, arr.length - 1)]; }
  function randSign() { return randInt(0, 1) === 1 ? 1 : -1; }
  function parseFR(str) {
    if (!str) return NaN;
    return parseFloat(str.replace(',', '.'));
  }

  // ---------- Génération de nombres relatifs ----------
  function genNumber(minMag, maxMag, forceInt) {
    const isDecimal = !forceInt && randInt(0, 9) < 4; // ~40% décimaux
    let mag;
    if (isDecimal) {
      const maxD = Math.min(maxMag, 15);
      mag = randInt(minMag * 10, maxD * 10) / 10;
    } else {
      mag = randInt(minMag, maxMag);
    }
    return randSign() * mag;
  }

  function fmtAbs(n) {
    const v = Math.abs(n);
    let r = Math.round(v * 100) / 100;
    return r.toString().replace('.', ',');
  }
  // affiche un nombre relatif ; les négatifs sont toujours entre parenthèses
  function term(n) {
    return n < 0 ? `(−${fmtAbs(n)})` : `${fmtAbs(n)}`;
  }
  function round2(n) { return Math.round(n * 100) / 100; }

  // ---------- Type A : opération simple (sans parenthèses de priorité) ----------
  function genSimple() {
    const op = randChoice(['+', '−', '×', '÷']);
    let a, b, answer;

    if (op === '÷') {
      b = genNumber(2, 12, true); // diviseur entier non nul
      const q = genNumber(1, 12); // quotient (peut être décimal à 1 chiffre)
      a = round2(b * q);
      answer = q;
    } else {
      a = genNumber(1, 20);
      b = genNumber(1, 20);
      if (op === '+') answer = round2(a + b);
      else if (op === '−') answer = round2(a - b);
      else answer = round2(a * b);
    }

    return {
      tag: 'CALCUL SIMPLE',
      text: `${term(a)} ${op} ${term(b)}`,
      hint: 'Applique la règle des signes',
      answer: answer,
      tolerance: 0.01
    };
  }

  // ---------- Type B : règles opératoires (priorités / parenthèses) ----------
  function genRules() {
    const patterns = [
      // a + b × c  (priorité naturelle : × d'abord)
      () => {
        const a = genNumber(1, 15), b = genNumber(1, 12), c = genNumber(1, 10);
        const addOp = randChoice(['+', '−']);
        const mulResult = round2(b * c);
        const answer = round2(addOp === '+' ? a + mulResult : a - mulResult);
        return {
          text: `${term(a)} ${addOp} ${term(b)} × ${term(c)}`,
          hint: 'Effectue la multiplication avant l\'addition/soustraction'
        , answer};
      },
      // a × b + c
      () => {
        const a = genNumber(1, 12), b = genNumber(1, 10), c = genNumber(1, 15);
        const addOp = randChoice(['+', '−']);
        const mulResult = round2(a * b);
        const answer = round2(addOp === '+' ? mulResult + c : mulResult - c);
        return {
          text: `${term(a)} × ${term(b)} ${addOp} ${term(c)}`,
          hint: 'Effectue la multiplication avant l\'addition/soustraction'
        , answer};
      },
      // (a + b) × c  -- parenthèses qui imposent l'ordre
      () => {
        const a = genNumber(1, 12), b = genNumber(1, 12), c = genNumber(1, 10, true);
        const addOp = randChoice(['+', '−']);
        const inner = round2(addOp === '+' ? a + b : a - b);
        const answer = round2(inner * c);
        return {
          text: `(${term(a)} ${addOp} ${term(b)}) × ${term(c)}`,
          hint: 'Calcule d\'abord la parenthèse'
        , answer};
      },
      // a × (b + c)
      () => {
        const a = genNumber(1, 10, true), b = genNumber(1, 12), c = genNumber(1, 12);
        const addOp = randChoice(['+', '−']);
        const inner = round2(addOp === '+' ? b + c : b - c);
        const answer = round2(a * inner);
        return {
          text: `${term(a)} × (${term(b)} ${addOp} ${term(c)})`,
          hint: 'Calcule d\'abord la parenthèse'
        , answer};
      },
      // a + b ÷ c  (division exacte garantie)
      () => {
        const c = genNumber(2, 10, true);
        const q = genNumber(1, 10);
        const b = round2(c * q);
        const a = genNumber(1, 15);
        const addOp = randChoice(['+', '−']);
        const answer = round2(addOp === '+' ? a + q : a - q);
        return {
          text: `${term(a)} ${addOp} ${term(b)} ÷ ${term(c)}`,
          hint: 'Effectue la division avant l\'addition/soustraction'
        , answer};
      },
      // (a ÷ b) + c  (division exacte garantie, parenthèse explicite)
      () => {
        const b = genNumber(2, 10, true);
        const q = genNumber(1, 10);
        const a = round2(b * q);
        const c = genNumber(1, 15);
        const addOp = randChoice(['+', '−']);
        const answer = round2(addOp === '+' ? q + c : q - c);
        return {
          text: `(${term(a)} ÷ ${term(b)}) ${addOp} ${term(c)}`,
          hint: 'Calcule d\'abord la parenthèse'
        , answer};
      },
      // a × b − c × d  (deux multiplications, priorité naturelle)
      () => {
        const a = genNumber(1, 9), b = genNumber(1, 9), c = genNumber(1, 9), d = genNumber(1, 9);
        const midOp = randChoice(['+', '−']);
        const p1 = round2(a * b), p2 = round2(c * d);
        const answer = round2(midOp === '+' ? p1 + p2 : p1 - p2);
        return {
          text: `${term(a)} × ${term(b)} ${midOp} ${term(c)} × ${term(d)}`,
          hint: 'Effectue les deux multiplications avant d\'additionner/soustraire'
        , answer};
      }
    ];

    const chosen = randChoice(patterns)();
    return {
      tag: 'RÈGLES DE PRIORITÉ',
      text: chosen.text,
      hint: chosen.hint,
      answer: chosen.answer,
      tolerance: 0.01
    };
  }

  function genQuestion() {
    return (randInt(0, 1) === 1) ? genRules() : genSimple();
  }

  // ---------- Etat de l'application ----------
  const state = {
    name: '',
    total: TOTAL_QUESTIONS,
    index: 0,
    score: 0,
    currentAnswer: '',
    currentQuestion: null,
    history: [],
    locked: false
  };

  // ---------- Navigation écrans ----------
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  document.getElementById('btn-name-next').addEventListener('click', () => {
    const val = document.getElementById('input-name').value.trim();
    state.name = val || 'Champion';
    state.index = 0;
    state.score = 0;
    state.history = [];
    showScreen('screen-quiz');
    nextQuestion();
  });
  document.getElementById('input-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-name-next').click();
  });

  function updateTopBar() {
    document.getElementById('quiz-progress-text').textContent = `Question ${state.index + 1}/${state.total}`;
    document.getElementById('quiz-score-text').textContent = `Score : ${state.score}`;
    const pct = (state.index / state.total) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function nextQuestion() {
    if (state.index >= state.total) {
      finishQuiz();
      return;
    }
    state.currentQuestion = genQuestion();
    state.currentAnswer = '';
    state.locked = false;
    updateTopBar();
    document.getElementById('question-tag').textContent = state.currentQuestion.tag;
    document.getElementById('question-text').textContent = state.currentQuestion.text;
    document.getElementById('question-hint').textContent = state.currentQuestion.hint;
    const disp = document.getElementById('answer-display');
    disp.textContent = 'Ta réponse';
    disp.className = 'answer-display empty';
    document.getElementById('feedback-note').textContent = '';
    document.getElementById('btn-validate').textContent = 'Valider';
    document.getElementById('btn-skip').style.display = 'block';
  }

  function updateAnswerDisplay() {
    const disp = document.getElementById('answer-display');
    if (state.currentAnswer === '' || state.currentAnswer === '-') {
      disp.textContent = state.currentAnswer === '-' ? '-' : 'Ta réponse';
      disp.className = state.currentAnswer === '-' ? 'answer-display' : 'answer-display empty';
    } else {
      disp.textContent = state.currentAnswer.replace('.', ',');
      disp.className = 'answer-display';
    }
  }

  document.getElementById('numpad').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || state.locked) return;
    const key = btn.dataset.key;
    if (key === 'back') {
      state.currentAnswer = state.currentAnswer.slice(0, -1);
    } else if (key === '.') {
      if (!state.currentAnswer.includes('.')) {
        state.currentAnswer += (state.currentAnswer === '' || state.currentAnswer === '-') ? state.currentAnswer + '0.' : '.';
      }
    } else if (key === 'sign') {
      if (state.currentAnswer.startsWith('-')) {
        state.currentAnswer = state.currentAnswer.slice(1);
      } else {
        state.currentAnswer = '-' + state.currentAnswer;
      }
    } else {
      if (state.currentAnswer === '0') state.currentAnswer = key;
      else state.currentAnswer += key;
    }
    updateAnswerDisplay();
  });

  function checkAnswer() {
    const q = state.currentQuestion;
    const given = parseFR(state.currentAnswer);
    if (isNaN(given)) return null;
    return Math.abs(given - q.answer) <= (q.tolerance || 0.01);
  }

  document.getElementById('btn-validate').addEventListener('click', () => {
    if (state.locked) {
      state.index++;
      nextQuestion();
      return;
    }
    if (state.currentAnswer === '' || state.currentAnswer === '-') return;
    const q = state.currentQuestion;
    const ok = checkAnswer();
    const disp = document.getElementById('answer-display');
    const feedback = document.getElementById('feedback-note');
    state.locked = true;
    document.getElementById('btn-skip').style.display = 'none';

    if (ok) {
      state.score++;
      disp.className = 'answer-display correct';
      feedback.style.color = '#2e7d54';
      feedback.textContent = '✓ Bonne réponse !';
      state.history.push({text: q.text, status: 'ok'});
    } else {
      disp.className = 'answer-display wrong';
      feedback.style.color = '#b8403a';
      const ansStr = (q.answer < 0 ? '−' : '') + Math.abs(q.answer).toString().replace('.', ',');
      feedback.textContent = `Réponse attendue : ${ansStr}`;
      state.history.push({text: q.text, status: 'ko'});
    }
    document.getElementById('quiz-score-text').textContent = `Score : ${state.score}`;
    document.getElementById('btn-validate').textContent = (state.index + 1 >= state.total) ? 'Voir les résultats' : 'Question suivante';
  });

  document.getElementById('btn-skip').addEventListener('click', () => {
    if (state.locked) return;
    state.history.push({text: state.currentQuestion.text, status: 'skip'});
    state.index++;
    nextQuestion();
  });

  document.getElementById('btn-quiz-restart').addEventListener('click', () => {
    const confirmLeave = confirm('Recommencer depuis le début ? Ta progression actuelle sera perdue.');
    if (confirmLeave) {
      state.index = 0;
      state.score = 0;
      state.history = [];
      nextQuestion();
    }
  });

  // ---------- Ecran résultats ----------
  function finishQuiz() {
    document.getElementById('results-name').textContent = state.name;
    document.getElementById('results-score-num').textContent = state.score;
    document.getElementById('results-total').textContent = state.total;
    let msg;
    const pct = state.score / state.total;
    if (pct === 1) msg = 'Score parfait, bravo ! 🎉';
    else if (pct >= 0.75) msg = 'Très bon travail !';
    else if (pct >= 0.5) msg = 'Pas mal, continue à t\'entraîner.';
    else msg = 'Courage, encore un peu d\'entraînement !';
    document.getElementById('results-msg').textContent = msg;

    const card = document.getElementById('breakdown-card');
    card.innerHTML = '';
    state.history.forEach((h, i) => {
      const row = document.createElement('div');
      row.className = 'breakdown-item';
      const statusLabel = h.status === 'ok' ? 'Juste' : (h.status === 'ko' ? 'Faux' : 'Passé');
      row.innerHTML = `<div class="bd-q">${i+1}. ${h.text}</div><div class="bd-status ${h.status}">${statusLabel}</div>`;
      card.appendChild(row);
    });

    showScreen('screen-results');
  }

  document.getElementById('btn-retry').addEventListener('click', () => {
    state.index = 0;
    state.score = 0;
    state.history = [];
    showScreen('screen-quiz');
    nextQuestion();
  });

})();
</script>
</body>
</html>
