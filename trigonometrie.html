<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trigonométrie</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #d9e4ec 100%);
    overscroll-behavior: none;
    user-select: none;
  }
  #app {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  h1 {
    text-align: center;
    color: #1e3a5f;
    font-size: 1.5rem;
    margin: 8px 0 24px 0;
  }
  h2 {
    text-align: center;
    color: #1e3a5f;
    font-size: 1.15rem;
    margin: 0 0 16px 0;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 4px 16px rgba(30,58,95,0.08);
    margin-bottom: 16px;
  }

  input[type=text] {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    border: 2px solid #cbd8e3;
    border-radius: 12px;
    text-align: center;
    background: #fafcfe;
  }
  input[type=text]:focus { outline: none; border-color: #3b82c4; }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin-top: 14px;
    font-size: 1.05rem;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #3b82c4, #2c5f8a);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.secondary {
    background: #eef2f6;
    color: #2c5f8a;
    font-weight: 500;
  }
  .btn.skip {
    background: #f5f0e0;
    color: #8a6d1e;
  }

  .count-row { display: flex; gap: 10px; }
  .count-btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    border: 2px solid #dbe5ee;
    border-radius: 12px;
    font-weight: 600;
    color: #2c5f8a;
    cursor: pointer;
  }
  .count-btn.selected {
    border-color: #3b82c4;
    background: #eaf3fb;
  }

  .progress-bar-wrap {
    height: 8px;
    background: #e2e9ef;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82c4, #5fa8dd);
    transition: width 0.25s;
  }
  .quiz-header-row {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 10px;
  }
  .link-btn {
    background: none;
    border: none;
    color: #6b7f91;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 4px 0;
    cursor: pointer;
  }
  .link-btn:active { opacity: 0.6; }
  .quiz-top-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #5c7185;
    margin-bottom: 14px;
  }
  .score-badge { font-weight: 700; color: #2c5f8a; }

  .question-box {
    background: white;
    border-radius: 18px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(30,58,95,0.08);
    margin-bottom: 16px;
  }
  .question-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    color: #3b82c4;
    background: #eaf3fb;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 0.03em;
  }
  .triangle-svg-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 1.05rem;
    color: #1e3a5f;
    font-weight: 500;
    line-height: 1.5;
    text-align: left;
  }
  .question-hint {
    font-size: 0.85rem;
    color: #8395a5;
    margin-top: 10px;
    text-align: left;
  }

  .answer-display {
    background: #f5f8fb;
    border: 2px solid #cbd8e3;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    color: #1e3a5f;
    min-height: 26px;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  .answer-display.empty { color: #b0bfcb; }
  .answer-display.correct { border-color: #4caf7d; background: #eafaf1; color: #2e7d54; }
  .answer-display.wrong { border-color: #e0655f; background: #fdecec; color: #b8403a; }

  .feedback-note {
    text-align: center;
    font-size: 0.9rem;
    color: #b8403a;
    min-height: 20px;
    margin-bottom: 8px;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .numpad button {
    padding: 16px 0;
    font-size: 1.3rem;
    font-weight: 600;
    color: #1e3a5f;
    background: white;
    border: none;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(30,58,95,0.08);
    cursor: pointer;
  }
  .numpad button:active { background: #eaf3fb; }
  .numpad button.func { color: #6b7f91; font-size: 1.1rem; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .action-row .btn { margin-top: 0; }

  .results-summary {
    text-align: center;
    margin-bottom: 20px;
  }
  .results-score {
    font-size: 2.4rem;
    font-weight: 800;
    color: #2c5f8a;
  }
  .results-score span { font-size: 1.3rem; color: #8395a5; }
  .results-msg { color: #5c7185; margin-top: 6px; font-size: 0.95rem; }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid #eef2f6;
    font-size: 0.85rem;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .bd-q { color: #1e3a5f; flex: 1; padding-right: 10px; }
  .bd-status {
    font-weight: 700;
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .bd-status.ok { background: #eafaf1; color: #2e7d54; }
  .bd-status.ko { background: #fdecec; color: #b8403a; }
  .bd-status.skip { background: #f5f0e0; color: #8a6d1e; }

  .footer-note {
    text-align: center;
    font-size: 0.75rem;
    color: #a3b2c0;
    margin-top: auto;
    padding-top: 20px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ECRAN 1 : Nom -->
  <div class="screen active" id="screen-name">
    <h1>📐 Trigonométrie<br><span style="font-size:0.9rem; font-weight:400; color:#5c7185;">Triangle rectangle</span></h1>
    <div class="card">
      <h2>Ton prénom</h2>
      <input type="text" id="input-name" placeholder="Ex : Léo" autocomplete="off" autocapitalize="words">
      <button class="btn" id="btn-name-next">Continuer</button>
    </div>
    <div class="footer-note">sin, cos, tan et leurs réciproques</div>
  </div>

  <!-- ECRAN 2 : Nombre de questions -->
  <div class="screen" id="screen-setup">
    <h2 id="setup-greeting">Nombre de questions</h2>
    <div class="card">
      <div class="count-row">
        <div class="count-btn" data-count="8">8</div>
        <div class="count-btn selected" data-count="12">12</div>
        <div class="count-btn" data-count="20">20</div>
      </div>
    </div>
    <button class="btn" id="btn-start-quiz">Commencer</button>
    <button class="btn secondary" id="btn-back-name">Retour</button>
  </div>

  <!-- ECRAN 3 : Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header-row">
      <button class="link-btn" id="btn-quiz-restart">← Recommencer</button>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="quiz-top-row">
      <span id="quiz-progress-text">Question 1/12</span>
      <span class="score-badge" id="quiz-score-text">Score : 0</span>
    </div>

    <div class="question-box">
      <div class="question-tag" id="question-tag">TRIGONOMÉTRIE</div>
      <div class="triangle-svg-wrap" id="triangle-svg-wrap"></div>
      <div class="question-text" id="question-text">...</div>
      <div class="question-hint" id="question-hint"></div>
    </div>

    <div class="answer-display empty" id="answer-display">Ta réponse</div>
    <div class="feedback-note" id="feedback-note"></div>

    <div class="numpad" id="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key="." class="func">,</button><button data-key="0">0</button><button data-key="back" class="func">⌫</button>
    </div>

    <div class="action-row">
      <button class="btn skip" id="btn-skip" style="flex:1;">Passer</button>
      <button class="btn" id="btn-validate" style="flex:2;">Valider</button>
    </div>
  </div>

  <!-- ECRAN 4 : Résultats -->
  <div class="screen" id="screen-results">
    <h2>Résultats</h2>
    <div class="card results-summary">
      <div class="results-score"><span id="results-name"></span><br><span id="results-score-num">0</span><span> / <span id="results-total">0</span></span></div>
      <div class="results-msg" id="results-msg"></div>
    </div>
    <div class="card" id="breakdown-card" style="max-height:340px; overflow-y:auto;"></div>
    <button class="btn" id="btn-retry">Recommencer</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- Utilitaires aléatoires ----------
  function randInt(min, max) {
    const range = max - min + 1;
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return min + (buf[0] % range);
  }
  function randChoice(arr) { return arr[randInt(0, arr.length - 1)]; }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = randInt(0, i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function fmt(n) {
    let r = Math.round(n * 10) / 10;
    return r.toString().replace('.', ',');
  }
  function parseFR(str) {
    if (!str) return NaN;
    return parseFloat(str.replace(',', '.'));
  }
  function toRad(deg) { return deg * Math.PI / 180; }
  function toDeg(rad) { return rad * 180 / Math.PI; }

  // ---------- Génération des exercices ----------
  const LETTER_SETS = ['ABC', 'MNP', 'RST', 'XYZ', 'EFG', 'JKL', 'UVW', 'DEF', 'GHI', 'LMN'];

  function genTrig() {
    // R = sommet de l'angle droit, P = sommet où se trouve l'angle étudié, Q = troisième sommet
    const letters = shuffle(LETTER_SETS[randInt(0, LETTER_SETS.length - 1)].split(''));
    const R = letters[0], P = letters[1], Q = letters[2];

    const angleP = randInt(20, 70);
    const rad = toRad(angleP);
    const baseType = randChoice(['hyp', 'opp', 'adj']);
    const baseValue = randInt(30, 200) / 10; // 3.0 à 20.0

    let hyp, opp, adj;
    if (baseType === 'hyp') {
      hyp = baseValue;
      opp = hyp * Math.sin(rad);
      adj = hyp * Math.cos(rad);
    } else if (baseType === 'opp') {
      opp = baseValue;
      hyp = opp / Math.sin(rad);
      adj = opp / Math.tan(rad);
    } else {
      adj = baseValue;
      hyp = adj / Math.cos(rad);
      opp = adj * Math.tan(rad);
    }

    const sideLabel = { hyp: `${P}${Q}`, opp: `${Q}${R}`, adj: `${P}${R}` };
    const kind = randChoice(['side', 'angle']);

    // valeurs arrondies des 3 côtés (affichage)
    const hypR = Math.round(hyp * 10) / 10;
    const oppR = Math.round(opp * 10) / 10;
    const adjR = Math.round(adj * 10) / 10;
    const roundedVals = { hyp: hypR, opp: oppR, adj: adjR };

    // on choisit aléatoirement lequel des deux angles aigus est concerné (en P ou en Q)
    const useP = randInt(0, 1) === 1;
    const angleVertex = useP ? P : Q;
    const relOppType = useP ? 'opp' : 'adj'; // côté opposé à l'angle étudié
    const relAdjType = useP ? 'adj' : 'opp'; // côté adjacent à l'angle étudié
    const targetAngle = useP ? angleP : (90 - angleP);

    if (kind === 'side') {
      // on donne DEUX longueurs + l'angle étudié, on cherche la 3e longueur
      const unknownType = randChoice(['hyp', 'opp', 'adj']);
      const usedGivenType = (unknownType !== baseType) ? baseType : randChoice(['hyp', 'opp', 'adj'].filter(t => t !== unknownType));
      const usedGivenValue = (usedGivenType === baseType) ? baseValue : roundedVals[usedGivenType];

      const roleOf = (t) => (t === 'hyp') ? 'hyp' : (t === relOppType ? 'opp' : 'adj');
      const pairKey = [roleOf(usedGivenType), roleOf(unknownType)].sort().join('-');
      const rad2 = toRad(targetAngle);

      let unknownValue;
      if (pairKey === 'hyp-opp') {
        unknownValue = (roleOf(usedGivenType) === 'hyp') ? usedGivenValue * Math.sin(rad2) : usedGivenValue / Math.sin(rad2);
      } else if (pairKey === 'adj-hyp') {
        unknownValue = (roleOf(usedGivenType) === 'hyp') ? usedGivenValue * Math.cos(rad2) : usedGivenValue / Math.cos(rad2);
      } else {
        unknownValue = (roleOf(usedGivenType) === 'opp') ? usedGivenValue / Math.tan(rad2) : usedGivenValue * Math.tan(rad2);
      }
      unknownValue = Math.round(unknownValue * 10) / 10;

      let formula;
      if (pairKey === 'hyp-opp') formula = `sin(${angleVertex}) = ${sideLabel[relOppType]} / ${sideLabel.hyp}`;
      else if (pairKey === 'adj-hyp') formula = `cos(${angleVertex}) = ${sideLabel[relAdjType]} / ${sideLabel.hyp}`;
      else formula = `tan(${angleVertex}) = ${sideLabel[relOppType]} / ${sideLabel[relAdjType]}`;

      const knownTypes = ['hyp', 'opp', 'adj'].filter(t => t !== unknownType);
      const shownSides = {};
      knownTypes.forEach(t => { shownSides[t] = (t === baseType) ? baseValue : roundedVals[t]; });
      shownSides[unknownType] = '?';

      const givenText = knownTypes.map(t => `${sideLabel[t]} = ${fmt(shownSides[t])} cm`).join(' et ');

      return {
        tag: 'CALCULER UNE LONGUEUR',
        R, P, Q,
        angleShown: Math.round(targetAngle),
        angleVertexShown: angleVertex,
        sideValues: shownSides,
        text: `Triangle rectangle en ${R}. L'angle en ${angleVertex} mesure ${Math.round(targetAngle)}°. On donne ${givenText}.\nCalcule ${sideLabel[unknownType]} (arrondi au dixième).`,
        hint: `Utilise : ${formula}`,
        answer: unknownValue,
        answerUnit: 'cm',
        tolerance: 0.15
      };
    } else {
      // kind === 'angle' : les 3 longueurs sont données, on cherche l'angle en P ou en Q
      const pairType = randChoice(['hyp-opp', 'adj-hyp', 'opp-adj']);
      const oppPhysical = roundedVals[relOppType];
      const adjPhysical = roundedVals[relAdjType];

      let angleAnswer, formula;
      if (pairType === 'hyp-opp') {
        angleAnswer = toDeg(Math.asin(oppPhysical / hypR));
        formula = `sin(${angleVertex}) = ${sideLabel[relOppType]} / ${sideLabel.hyp}, puis sin⁻¹`;
      } else if (pairType === 'adj-hyp') {
        angleAnswer = toDeg(Math.acos(adjPhysical / hypR));
        formula = `cos(${angleVertex}) = ${sideLabel[relAdjType]} / ${sideLabel.hyp}, puis cos⁻¹`;
      } else {
        angleAnswer = toDeg(Math.atan(oppPhysical / adjPhysical));
        formula = `tan(${angleVertex}) = ${sideLabel[relOppType]} / ${sideLabel[relAdjType]}, puis tan⁻¹`;
      }
      angleAnswer = Math.round(angleAnswer);

      const shownSides = { hyp: hypR, opp: oppR, adj: adjR };
      const givenText = `${sideLabel.hyp} = ${fmt(hypR)} cm, ${sideLabel.opp} = ${fmt(oppR)} cm et ${sideLabel.adj} = ${fmt(adjR)} cm`;

      return {
        tag: "CALCULER UN ANGLE",
        R, P, Q,
        angleShown: '?',
        angleVertexShown: angleVertex,
        sideValues: shownSides,
        text: `Triangle rectangle en ${R}. On donne ${givenText}.\nCalcule la mesure de l'angle en ${angleVertex} (arrondie à l'unité).`,
        hint: `Utilise : ${formula}`,
        answer: angleAnswer,
        answerUnit: '°',
        tolerance: 1.5
      };
    }
  }

  // ---------- Rendu SVG du triangle ----------
  function renderTriangleSVG(q) {
    // Disposition fixe (schématique, non à l'échelle) : angle droit en R (bas-gauche)
    const Rx = 55, Ry = 210;
    const Px = 280, Py = 210;
    const Qx = 55, Qy = 30;

    const oppVal = q.sideValues.opp;
    const adjVal = q.sideValues.adj;
    const hypVal = q.sideValues.hyp;
    const angleTxt = (q.angleShown === '?') ? '?' : `${q.angleShown}°`;
    const angleAtP = (q.angleVertexShown === q.P);

    const arcMarkup = angleAtP
      ? `<path d="M ${Px - 26} ${Py} A 26 26 0 0 1 ${Px - 15} ${Py - 22}" fill="none" stroke="#3b82c4" stroke-width="2"/>
         <text x="${Px - 38}" y="${Py - 13}" font-size="15" font-weight="700" fill="#3b82c4" text-anchor="middle" dominant-baseline="middle">${angleTxt}</text>`
      : `<path d="M ${Qx} ${Qy + 26} A 26 26 0 0 0 ${Qx + 20} ${Qy + 15}" fill="none" stroke="#3b82c4" stroke-width="2"/>
         <text x="${Qx + 17}" y="${Qy + 36}" font-size="15" font-weight="700" fill="#3b82c4" text-anchor="middle" dominant-baseline="middle">${angleTxt}</text>`;

    return `
    <svg width="320" height="250" viewBox="0 0 320 250" xmlns="http://www.w3.org/2000/svg">
      <line x1="${Rx}" y1="${Ry}" x2="${Px}" y2="${Py}" stroke="#2c5f8a" stroke-width="3" stroke-linecap="round"/>
      <line x1="${Rx}" y1="${Ry}" x2="${Qx}" y2="${Qy}" stroke="#2c5f8a" stroke-width="3" stroke-linecap="round"/>
      <line x1="${Px}" y1="${Py}" x2="${Qx}" y2="${Qy}" stroke="#2c5f8a" stroke-width="3" stroke-linecap="round"/>

      <!-- marque d'angle droit -->
      <path d="M ${Rx} ${Ry - 16} L ${Rx + 16} ${Ry - 16} L ${Rx + 16} ${Ry}" fill="none" stroke="#2c5f8a" stroke-width="2"/>

      <!-- arc de l'angle étudié -->
      ${arcMarkup}

      <!-- sommets -->
      <text x="${Rx - 16}" y="${Ry + 18}" font-size="17" font-weight="700" fill="#1e3a5f">${q.R}</text>
      <text x="${Px + 12}" y="${Py + 18}" font-size="17" font-weight="700" fill="#1e3a5f">${q.P}</text>
      <text x="${Qx - 16}" y="${Qy - 6}" font-size="17" font-weight="700" fill="#1e3a5f">${q.Q}</text>

      <!-- valeurs des côtés -->
      <text x="${(Rx + Px) / 2}" y="${Ry + 24}" font-size="14" font-weight="600" fill="#2c5f8a" text-anchor="middle">${adjVal === '?' ? '?' : fmt(adjVal) + ' cm'}</text>
      <text x="${Rx - 30}" y="${(Ry + Qy) / 2}" font-size="14" font-weight="600" fill="#2c5f8a" text-anchor="middle">${oppVal === '?' ? '?' : fmt(oppVal) + ' cm'}</text>
      <text x="${(Px + Qx) / 2 + 34}" y="${(Py + Qy) / 2 - 6}" font-size="14" font-weight="600" fill="#2c5f8a" text-anchor="middle">${hypVal === '?' ? '?' : fmt(hypVal) + ' cm'}</text>
    </svg>`;
  }

  // ---------- Etat de l'application ----------
  const state = {
    name: '',
    total: 12,
    index: 0,
    score: 0,
    currentAnswer: '',
    currentQuestion: null,
    history: [],
    locked: false
  };

  // ---------- Navigation écrans ----------
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  document.getElementById('btn-name-next').addEventListener('click', () => {
    const val = document.getElementById('input-name').value.trim();
    state.name = val || 'Champion';
    document.getElementById('setup-greeting').textContent = `Bien joué ${state.name}, choisis le nombre de questions`;
    showScreen('screen-setup');
  });
  document.getElementById('input-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-name-next').click();
  });

  document.querySelectorAll('.count-btn').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.count-btn').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      state.total = parseInt(el.dataset.count, 10);
    });
  });
  document.getElementById('btn-back-name').addEventListener('click', () => showScreen('screen-name'));

  document.getElementById('btn-start-quiz').addEventListener('click', () => {
    state.index = 0;
    state.score = 0;
    state.history = [];
    showScreen('screen-quiz');
    nextQuestion();
  });

  function updateTopBar() {
    document.getElementById('quiz-progress-text').textContent = `Question ${state.index + 1}/${state.total}`;
    document.getElementById('quiz-score-text').textContent = `Score : ${state.score}`;
    const pct = (state.index / state.total) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function nextQuestion() {
    if (state.index >= state.total) {
      finishQuiz();
      return;
    }
    const q = genTrig();
    state.currentQuestion = q;
    state.currentAnswer = '';
    state.locked = false;
    updateTopBar();
    document.getElementById('question-tag').textContent = q.tag;
    document.getElementById('triangle-svg-wrap').innerHTML = renderTriangleSVG(q);
    document.getElementById('question-text').textContent = q.text;
    document.getElementById('question-hint').textContent = q.hint;
    const disp = document.getElementById('answer-display');
    disp.textContent = 'Ta réponse';
    disp.className = 'answer-display empty';
    document.getElementById('feedback-note').textContent = '';
    document.getElementById('btn-validate').textContent = 'Valider';
    document.getElementById('btn-skip').style.display = 'block';
  }

  function updateAnswerDisplay() {
    const disp = document.getElementById('answer-display');
    if (state.currentAnswer === '') {
      disp.textContent = 'Ta réponse';
      disp.className = 'answer-display empty';
    } else {
      disp.textContent = state.currentAnswer.replace('.', ',') + ' ' + state.currentQuestion.answerUnit;
      disp.className = 'answer-display';
    }
  }

  document.getElementById('numpad').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || state.locked) return;
    const key = btn.dataset.key;
    if (key === 'back') {
      state.currentAnswer = state.currentAnswer.slice(0, -1);
    } else if (key === '.') {
      if (!state.currentAnswer.includes('.')) {
        state.currentAnswer += (state.currentAnswer === '' ? '0.' : '.');
      }
    } else {
      if (state.currentAnswer === '0') state.currentAnswer = key;
      else state.currentAnswer += key;
    }
    updateAnswerDisplay();
  });

  function checkAnswer() {
    const q = state.currentQuestion;
    const given = parseFR(state.currentAnswer);
    if (isNaN(given)) return null;
    return Math.abs(given - q.answer) <= q.tolerance;
  }

  document.getElementById('btn-validate').addEventListener('click', () => {
    if (state.locked) {
      state.index++;
      nextQuestion();
      return;
    }
    if (state.currentAnswer === '') return;
    const q = state.currentQuestion;
    const ok = checkAnswer();
    const disp = document.getElementById('answer-display');
    const feedback = document.getElementById('feedback-note');
    state.locked = true;
    document.getElementById('btn-skip').style.display = 'none';

    if (ok) {
      state.score++;
      disp.className = 'answer-display correct';
      feedback.style.color = '#2e7d54';
      feedback.textContent = '✓ Bonne réponse !';
      state.history.push({text: q.tag, status: 'ok'});
    } else {
      disp.className = 'answer-display wrong';
      feedback.style.color = '#b8403a';
      feedback.textContent = `Réponse attendue : ${fmt(q.answer)} ${q.answerUnit}`;
      state.history.push({text: q.tag, status: 'ko'});
    }
    document.getElementById('quiz-score-text').textContent = `Score : ${state.score}`;
    document.getElementById('btn-validate').textContent = (state.index + 1 >= state.total) ? 'Voir les résultats' : 'Question suivante';
  });

  document.getElementById('btn-skip').addEventListener('click', () => {
    if (state.locked) return;
    state.history.push({text: state.currentQuestion.tag, status: 'skip'});
    state.index++;
    nextQuestion();
  });

  document.getElementById('btn-quiz-restart').addEventListener('click', () => {
    const confirmLeave = confirm('Recommencer depuis le début ? Ta progression actuelle sera perdue.');
    if (confirmLeave) {
      showScreen('screen-setup');
    }
  });

  function finishQuiz() {
    document.getElementById('results-name').textContent = state.name;
    document.getElementById('results-score-num').textContent = state.score;
    document.getElementById('results-total').textContent = state.total;
    let msg;
    const pct = state.score / state.total;
    if (pct === 1) msg = 'Score parfait, bravo ! 🎉';
    else if (pct >= 0.75) msg = 'Très bon travail !';
    else if (pct >= 0.5) msg = 'Pas mal, continue à t\'entraîner.';
    else msg = 'Courage, encore un peu d\'entraînement !';
    document.getElementById('results-msg').textContent = msg;

    const card = document.getElementById('breakdown-card');
    card.innerHTML = '';
    state.history.forEach((h, i) => {
      const row = document.createElement('div');
      row.className = 'breakdown-item';
      const statusLabel = h.status === 'ok' ? 'Juste' : (h.status === 'ko' ? 'Faux' : 'Passé');
      row.innerHTML = `<div class="bd-q">${i+1}. ${h.text}</div><div class="bd-status ${h.status}">${statusLabel}</div>`;
      card.appendChild(row);
    });

    showScreen('screen-results');
  }

  document.getElementById('btn-retry').addEventListener('click', () => {
    state.index = 0;
    state.score = 0;
    state.history = [];
    showScreen('screen-quiz');
    nextQuestion();
  });

})();
</script>
</body>
</html>
